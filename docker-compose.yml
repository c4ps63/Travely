services:

  postgres-stakeholders:
    image: postgres:16
    environment:
      POSTGRES_DB: travely_stakeholders
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres-stakeholders-data:/var/lib/postgresql/data
    networks:
      - travely-network

  stakeholders-service:
    build:
      context: ./stakeholders-service
    ports:
      - "8001:8001"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-stakeholders:5432/travely_stakeholders
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - postgres-stakeholders
    networks:
      - travely-network

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: travely_blog
    volumes:
      - mongodb-data:/data/db
    networks:
      - travely-network

  blog-service:
    build:
      context: ./blog-service
    ports:
      - "8002:8002"
    environment:
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: travely_blog
    depends_on:
      - mongodb
    networks:
      - travely-network

  postgres-tours:
    image: postgres:16
    environment:
      POSTGRES_DB: travely_tours
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    volumes:
      - postgres-tours-data:/var/lib/postgresql/data
    networks:
      - travely-network

  tour-service:
    build:
      context: ./tour-service
    ports:
      - "8003:8003"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-tours:5432/travely_tours
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
    depends_on:
      - postgres-tours
    networks:
      - travely-network

  gateway:
    build:
      context: ./gateway
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET: travely-secret-key-which-must-be-at-least-256-bits-long-for-hs256
      STAKEHOLDERS_URL: http://stakeholders-service:8001
      BLOG_URL: http://blog-service:8002
      TOUR_URL: http://tour-service:8003
      FOLLOWER_URL: http://follower-service:8005
    depends_on:
      - stakeholders-service
      - blog-service
    networks:
      - travely-network

networks:
  travely-network:
    driver: bridge

volumes:
  postgres-stakeholders-data:
  mongodb-data:
  postgres-tours-data:
